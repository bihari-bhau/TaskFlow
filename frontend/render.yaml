services:
  - type: web
    name: taskflow-frontend
    env: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false        # Set manually: http://localhost:8000/api (for browser fallback)
      - key: BACKEND_API_URL
        value: https://taskflow-production-8281.up.railway.app  # Nginx proxy to backend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # Enables React Router client-side routing
