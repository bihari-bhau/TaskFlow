# backend/railway.toml
#
# WHY bash start.sh instead of "uvicorn ... --port $PORT" directly?
#
# Railway's startCommand runs without a shell by default.
# That means environment variables like $PORT are passed as
# literal strings — uvicorn sees "--port $PORT" and crashes.
#
# start.sh is a real shell script, so $PORT expands correctly
# to the actual port number Railway assigned (e.g. 3456).

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand            = "bash start.sh"
healthcheckPath         = "/health"
healthcheckTimeout      = 300
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 10