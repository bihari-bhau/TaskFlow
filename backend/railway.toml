# railway.toml — Backend (FastAPI)
# Place this file at: backend/railway.toml
#
# Railway reads this to know how to build + start your service.
# The startCommand here OVERRIDES the Dockerfile CMD (wait-for-db.sh)
# because on Railway the DB is Supabase (always already running).

[build]
builder          = "DOCKERFILE"
dockerfilePath   = "Dockerfile"

[deploy]
# Railway injects $PORT automatically — never hardcode it
startCommand        = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath     = "/health"
healthcheckTimeout  = 300
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 10
